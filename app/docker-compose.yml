services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iot_bee
      POSTGRES_USER: iot_bee
      POSTGRES_PASSWORD: iot_bee_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_bee -d iot_bee"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgres://iot_bee:iot_bee_dev@postgres:5432/iot_bee
      API_HOST: 0.0.0.0
      API_PORT: 8080
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2f
      RUST_LOG: ${RUST_LOG:-info}
      DEMO_TRACE_PATH: /demo-trace/events.ndjson
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - cargo_target:/app/target
      - demo_trace:/demo-trace

  rabbitmq:
    container_name: iot-bees-demo-rabbitmq
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  demo-publisher:
    container_name: iot-bees-demo-telemetry-publisher
    image: python:3.13-alpine
    profiles: ["demo"]
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["python", "/app/telemetry_publisher.py"]
    volumes:
      - ./demo/telemetry_publisher.py:/app/telemetry_publisher.py:ro
    ports:
      - "8091:8091"

  demo-sink:
    container_name: iot-bees-demo-webhook
    image: python:3.13-alpine
    profiles: ["demo"]
    command: ["python", "/app/webhook_receiver.py"]
    volumes:
      - ./demo/webhook_receiver.py:/app/webhook_receiver.py:ro
      - demo_trace:/demo-trace
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  cargo_target:
  postgres_data:
  demo_trace:
