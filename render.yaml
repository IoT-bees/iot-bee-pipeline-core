services:
  - type: web
    name: iot-bee-api
    runtime: docker
    rootDir: app
    # Con rootDir=app, Render resuelve estas rutas desde app/.
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iot-bee-postgres
          property: connectionString
      - key: API_HOST
        value: 0.0.0.0
      - key: RUST_LOG
        value: info
      - key: JWT_EXPIRES_IN_HOURS
        value: "24"
      - key: AUDIT_RETENTION_DAYS
        value: "90"
      # Activa RabbitMQ, emisor y receptor dentro del único Web Service Free.
      - key: IOTBEE_DEMO_MODE
        value: "1"
      # Se definen en Render al crear el servicio. No se guardan en Git.
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_NAME
        sync: false

databases:
  - name: iot-bee-postgres
    databaseName: iot_bee
    user: iot_bee
